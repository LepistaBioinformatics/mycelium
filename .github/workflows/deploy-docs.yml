name: Deploy Documentation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: 'latest'

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-mdbook-i18n-helpers-0.4.0

      - name: Install mdbook-i18n-helpers
        run: |
          if ! command -v mdbook-gettext &> /dev/null; then
            cargo install mdbook-i18n-helpers --version 0.4.0 --locked
          fi

      - name: Build English documentation
        run: |
          cd docs/book
          mdbook build

      - name: Build Portuguese (pt-BR) documentation
        run: |
          cd docs/book
          MDBOOK_BOOK__LANGUAGE=pt-BR mdbook build --dest-dir /tmp/book-pt-br
          mv /tmp/book-pt-br docs/book/book/pt-BR

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/book/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
